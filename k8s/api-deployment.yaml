apiVersion: apps/v1
kind: Deployment
metadata:
  name: sequence-ai-api
  labels:
    app: sequence-ai-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sequence-ai-api
  template:
    metadata:
      labels:
        app: sequence-ai-api
    spec:
      containers:
        - name: api
          image: sequence-ai:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/agents
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/agents
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: sequence-ai-api
  labels:
    app: sequence-ai-api
spec:
  selector:
    app: sequence-ai-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sequence-ai-api-hpa
  labels:
    app: sequence-ai-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sequence-ai-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
